services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: iot-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:16
    container_name: iot-postgres
    ports:
      # хост-порт берётся из PG_PORT (.env), по умолчанию 5432.
      # Поменяйте, если 5432 на хосте занят (тогда тот же PG_PORT увидит и Flink).
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iot
    volumes:
      - ./sql/ddl.sql:/docker-entrypoint-initdb.d/01_ddl.sql:ro
      - ./sql/dml.sql:/docker-entrypoint-initdb.d/02_dml.sql:ro
